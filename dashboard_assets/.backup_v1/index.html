<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <div class="app-container">

        <!-- ── HEADER ── -->
        <header class="topbar">
            <div class="brand">
                AEGIS / TERMINAL
                <div class="status-indicator">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-label">CONNECTING</span>
                </div>
                <span id="mode-badge" style="font-family: var(--font-mono); font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 3px; margin-left: 12px; background: var(--color-warn); color: #000; letter-spacing: 1px;">PAPER</span>
                <div id="clock" style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-left: 12px;"></div>
            </div>

            <div class="kpi-row">
                <div class="kpi-item" style="flex-direction: row; align-items: center; gap: 8px;">
                    <div>
                        <div class="kpi-label">Session PNL</div>
                        <div class="kpi-value" id="kpi-pnl-val">0.00</div>
                    </div>
                    <div id="pnl-curve" class="pnl-chart-container"></div>
                </div>
                <div class="kpi-item">
                    <div class="kpi-label">Live PNL</div>
                    <div class="kpi-value" id="kpi-live-pnl-val">0.00</div>
                </div>
                <div class="kpi-item">
                    <div class="kpi-label">Win Rate</div>
                    <div class="kpi-value" id="kpi-win-val">—</div>
                </div>
                <div class="kpi-item">
                    <div class="kpi-label">Open</div>
                    <div class="kpi-value" id="kpi-open-val">0</div>
                </div>
                <div class="kpi-item">
                    <div class="kpi-label">Notional</div>
                    <div class="kpi-value" id="kpi-notional-val">0</div>
                </div>
                
                <!-- Dynamic Health items -->
                <div id="health-stack" style="display:flex; gap: 16px;"></div>
            </div>
        </header>

        <!-- ── MAIN GRID ── -->
        <main class="grid-container">

            <!-- COLUMN 1: INTEL & MARKET -->
            <div class="column" style="font-size: 11px;">
                <div class="panel flex-1">
                    <div class="panel-header" style="padding: 4px 8px;">
                        <span class="panel-title" style="font-size: 9px;">Intel Feeds</span>
                    </div>
                    <div class="tabs-header" id="signal-tabs">
                        <button class="tab-btn active" data-target="tab-sig" style="padding: 4px 8px; font-size: 9px;">SIG</button>
                        <button class="tab-btn" data-target="tab-evt" style="padding: 4px 8px; font-size: 9px;">EVT</button>
                        <button class="tab-btn" data-target="tab-mw" style="padding: 4px 8px; font-size: 9px;">MW</button>
                    </div>
                    <div class="panel-content">
                        <table class="data-table tab-content active" id="tab-sig" style="font-size: 10px;">
                            <tbody id="signal-feed"></tbody>
                        </table>
                        <table class="data-table tab-content" id="tab-evt" style="font-size: 10px;">
                            <tbody id="event-feed"></tbody>
                        </table>
                        <table class="data-table tab-content" id="tab-mw" style="font-size: 10px;">
                             <tbody id="mw-feed"></tbody>
                        </table>
                    </div>
                </div>

                <div class="panel flex-1">
                    <div class="panel-header" style="padding: 4px 8px;">
                        <span class="panel-title" style="font-size: 9px;">L1 Liquidity</span>
                        <span class="badge" id="markets-count">0</span>
                    </div>
                    <div class="panel-content">
                        <table class="data-table" style="font-size: 10px;">
                            <tbody id="markets-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- COLUMN 2: THE MAIN SPOTLIGHT (ULTRA DOMINANT WAR ROOM) -->
            <div class="column">
                <div class="panel flex-1" style="border: 2px solid var(--color-info); background: #020617;">
                    <div class="panel-header" style="background: var(--bg-surface); padding: 16px 32px; border-bottom: 2px solid var(--border-color);">
                        <div style="display:flex; align-items:center; gap:24px;">
                            <span class="panel-title" style="color: var(--color-info); font-size: 28px; letter-spacing: 5px; font-weight: 900;">WAR ROOM // LIVE MONITOR</span>
                            <div class="live-tag" style="font-size: 12px; padding: 4px 10px; border-width: 2px;">STREAM_ACTIVE</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:20px;">
                            <span class="badge" id="games-count" style="background: var(--color-info); font-size:22px; padding: 6px 18px; font-weight: 900;">0</span>
                        </div>
                    </div>
                    <div class="panel-content scroll" id="games-list" style="padding: 24px; display: flex; flex-direction: column; gap: 32px;">
                        <div class="empty-msg" style="font-size: 24px; margin-top: 150px; color: var(--text-dim); letter-spacing: 2px;">SCANNING FOR LIVE COMBAT DEPLOYMENTS...</div>
                    </div>
                </div>
            </div>

            <!-- COLUMN 3: OPERATIONS -->
            <div class="column" style="font-size: 11px;">
                <div class="panel flex-1">
                    <div class="panel-header" style="padding: 4px 8px;">
                        <span class="panel-title" style="font-size: 9px;">Exposure</span>
                        <span class="badge" id="open-count">0</span>
                    </div>
                    <div class="panel-content">
                        <table class="data-table" style="font-size: 10px;">
                            <tbody id="open-positions-list"></tbody>
                        </table>
                    </div>
                </div>

                <div class="panel flex-1">
                    <div class="panel-header" style="padding: 4px 8px;">
                        <span class="panel-title" style="font-size: 9px;">Signal Decisions</span>
                        <span class="badge" id="attempts-count">0</span>
                    </div>
                    <div class="panel-content">
                        <table class="data-table" style="font-size: 10px;">
                            <tbody id="attempts-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="panel" style="border-top: 2px solid var(--color-info);">
                    <div class="panel-header" style="padding: 4px 8px;">
                        <span class="panel-title" style="font-size: 9px;">Acquisition</span>
                        <span id="trade-msg" style="font-size: 9px;"></span>
                    </div>
                    <div class="ticket-form" style="padding: 8px;">
                        <form id="trade-form">
                            <input class="form-input" id="f-token" type="text" placeholder="TOKEN_ID" autocomplete="off" style="margin-bottom: 6px; font-size: 11px; padding: 4px; border-color: var(--color-info);">
                            <div class="form-row">
                                <div class="form-group">
                                    <input class="form-input" id="f-amount" type="number" value="23.0" step="1.0" style="padding: 4px; font-size: 11px;">
                                    <div class="size-presets">
                                        <button type="button" class="size-btn active" data-val="23">23</button>
                                        <button type="button" class="size-btn" data-val="70">70</button>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <input class="form-input" id="f-cap" type="number" value="0.75" step="0.01" style="padding: 4px; font-size: 11px;">
                                    <select class="form-input" id="f-type" style="margin-top: 4px; padding: 2px; font-size: 10px; font-weight: 700;">
                                        <option value="FAK">FAK</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn-submit" id="trade-btn" style="width: 100%; margin-top: 6px; padding: 6px; font-size: 11px; background: var(--color-info);">INITIATE</button>
                        </form>
                    </div>
                </div>
            </div>

        </main>
    </div>
<script src="/assets/app.js"></script>
</body>
</html>
